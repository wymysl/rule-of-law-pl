<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1220"></stop>
      <stop offset="0.6" stop-color="#070a12"></stop>
      <stop offset="1" stop-color="#04060b"></stop>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0" r="0.9">
      <stop offset="0" stop-color="#2d5fb4" stop-opacity="0.32"></stop>
      <stop offset="0.55" stop-color="#2d5fb4" stop-opacity="0"></stop>
    </radialGradient>
    <radialGradient id="glow2" cx="0.92" cy="0.08" r="0.7">
      <stop offset="0" stop-color="#b4463c" stop-opacity="0.20"></stop>
      <stop offset="0.55" stop-color="#b4463c" stop-opacity="0"></stop>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"></rect>
  <rect width="1200" height="630" fill="url(#glow)"></rect>
  <rect width="1200" height="630" fill="url(#glow2)"></rect>

  
  <g opacity="0.9">
    <line x1="980" y1="150" x2="1060" y2="240" stroke="#9bb3e0" stroke-opacity="0.25" stroke-width="1.5"></line>
    <line x1="1060" y1="240" x2="980" y2="340" stroke="#9bb3e0" stroke-opacity="0.25" stroke-width="1.5"></line>
    <line x1="1060" y1="240" x2="1130" y2="330" stroke="#9bb3e0" stroke-opacity="0.25" stroke-width="1.5"></line>
    <line x1="980" y1="340" x2="1050" y2="430" stroke="#9bb3e0" stroke-opacity="0.25" stroke-width="1.5"></line>
    <circle cx="980" cy="150" r="13" fill="#7da6e6"></circle>
    <circle cx="1060" cy="240" r="16" fill="#d98f7f"></circle>
    <circle cx="980" cy="340" r="13" fill="#7da6e6"></circle>
    <circle cx="1130" cy="330" r="11" fill="#d98f7f"></circle>
    <circle cx="1050" cy="430" r="13" fill="#7da6e6"></circle>
  </g>

  <text x="90" y="150" fill="#7da6e6" font-size="30" font-weight="600" letter-spacing="2">THE RULE OF LAW CRISIS · POLAND</text>
  <text x="86" y="290" fill="#eef2f8" font-size="92" font-weight="800" letter-spacing="-3">How a government</text>
  <text x="86" y="392" fill="#eef2f8" font-size="92" font-weight="800" letter-spacing="-3">captured its courts.</text>
  <text x="90" y="470" fill="#aab4c6" font-size="34" font-weight="300">The ECtHR &amp; CJEU judgments — explained for everyone.</text>

  <g transform="translate(90,520)">
    <circle cx="9" cy="10" r="9" fill="#3f73c4"></circle>
    <text x="26" y="17" fill="#c7d2e4" font-size="24" font-weight="500">CJEU (EU law)</text>
    <circle cx="239" cy="10" r="9" fill="#cc6155"></circle>
    <text x="256" y="17" fill="#c7d2e4" font-size="24" font-weight="500">ECtHR (human rights)</text>
  </g>
</svg>